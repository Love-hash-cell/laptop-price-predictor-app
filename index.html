<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Laptop Price Predictor</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: white;
            padding: 30px 40px;
            border-radius: 15px;
            width: 350px;
            box-shadow: 0px 10px 30px rgba(0,0,0,0.2);
            text-align: center;
        }

        h2 {
            margin-bottom: 20px;
            color: #333;
        }

        .input-group {
            margin-bottom: 15px;
            text-align: left;
        }

        label {
            font-size: 14px;
            color: #555;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border-radius: 8px;
            border: 1px solid #ccc;
            outline: none;
            transition: 0.3s;
        }

        input:focus {
            border-color: #2a5298;
            box-shadow: 0 0 5px rgba(42,82,152,0.5);
        }

        button {
            width: 100%;
            padding: 12px;
            background: #2a5298;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            margin-top: 10px;
            transition: 0.3s;
        }

        button:hover {
            background: #1e3c72;
        }

        #result {
            margin-top: 20px;
            font-size: 18px;
            font-weight: bold;
            color: green;
        }

        .error {
            color: red;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>💻 Laptop Price Predictor</h2>

    <form id="form">
        <div class="input-group">
            <label>RAM (GB)</label>
            <input type="number" id="Ram" placeholder="e.g. 8" required>
        </div>

        <div class="input-group">
            <label>Weight (kg)</label>
            <input type="number" id="Weight" step="0.1" placeholder="e.g. 1.5" required>
        </div>

        <div class="input-group">
            <label>Touchscreen (0 = No, 1 = Yes)</label>
            <input type="number" id="Touchscreen" placeholder="0 or 1" required>
        </div>

        <button type="submit">🚀 Predict Price</button>
    </form>

    <div id="result"></div>
</div>
<script>
document.getElementById("form").addEventListener("submit", function(e){
    e.preventDefault();

    const resultBox = document.getElementById("result");
    resultBox.innerHTML = "⏳ Predicting...";

    const data = {
        ram: parseInt(document.getElementById("Ram").value),
        weight: parseFloat(document.getElementById("Weight").value),
        touchscreen: parseInt(document.getElementById("Touchscreen").value)
    };

    fetch("/predict", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify(data)
    })
    .then(res => {
        if (!res.ok) {
            throw new Error("Server error");
        }
        return res.json();
    })
    .then(data => {
        if (data.predicted_price !== undefined) {
            resultBox.innerHTML = "💰 Predicted Price: ₹ " + data.predicted_price.toFixed(2);
            resultBox.classList.remove("error");
        } else {
            resultBox.innerHTML = "❌ " + (data.error || "Prediction failed");
            resultBox.classList.add("error");
        }
    })
    .catch(err => {
        resultBox.innerHTML = "❌ Server busy or starting... wait 30 sec & try again";
        resultBox.classList.add("error");
    });
});
</script>

</body>
</html>
